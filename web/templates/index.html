<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Radio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1DB954 0%, #191414 100%);
            min-height: 100vh;
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            max-width: 600px;
            margin: 0 auto 30px;
        }

        input {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
        }

        button {
            padding: 15px 30px;
            border: none;
            border-radius: 30px;
            background: #1DB954;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .player {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            text-align: center;
        }

        .current-track {
            margin-bottom: 20px;
        }

        .track-name {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .artist-name {
            color: #b3b3b3;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .controls button {
            background: #535353;
            padding: 10px 20px;
        }

        .playlist {
            margin-top: 30px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
        }

        .playlist h2 {
            margin-bottom: 15px;
        }

        .track-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .track-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .track-item.playing {
            background: rgba(29, 185, 84, 0.3);
        }

        .track-item img {
            width: 50px;
            height: 50px;
            border-radius: 5px;
            margin-right: 15px;
        }

        .track-info {
            flex: 1;
            text-align: left;
        }

        .results {
            margin-top: 30px;
        }

        .results h2 {
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🎧 Spotify Radio</h1>
            <p>Поиск и потоковая трансляция музыки</p>
        </header>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Поиск трека, исполнителя или альбома...">
            <button onclick="search()">Поиск</button>
        </div>

        <div class="results" id="results" style="display: none;">
            <h2>Результаты поиска</h2>
            <div id="resultsList"></div>
        </div>

        <div class="player" id="player" style="display: none;">
            <div class="current-track">
                <div class="track-name" id="trackName"></div>
                <div class="artist-name" id="artistName"></div>
            </div>
            <div class="controls">
                <button onclick="prevTrack()">⏮</button>
                <button onclick="togglePlay()" id="playBtn">▶</button>
                <button onclick="nextTrack()">⏭</button>
                <button onclick="startRadio()">📻 Радио</button>
            </div>
            <div class="playlist" id="playlistSection" style="display: none;">
                <h2>Плейлист</h2>
                <div id="playlist"></div>
            </div>
        </div>
    </div>

    <script>
        let currentState = {
            isPlaying: false,
            currentTrack: null,
            playlist: []
        };

        async function search() {
            const query = document.getElementById('searchInput').value;
            if (!query) return;

            const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
            const data = await response.json();

            if (data.tracks) {
                showResults(data.tracks);
            }
        }

        function showResults(tracks) {
            const resultsDiv = document.getElementById('results');
            const resultsList = document.getElementById('resultsList');

            resultsList.innerHTML = tracks.map((track, index) => `
                <div class="track-item" onclick="selectTrack('${track.id}')">
                    <img src="${track.image || 'https://via.placeholder.com/50'}" alt="${track.name}">
                    <div class="track-info">
                        <div>${track.name}</div>
                        <div class="artist-name">${track.artist}</div>
                    </div>
                </div>
            `).join('');

            resultsDiv.style.display = 'block';
        }

        async function selectTrack(trackId) {
            const response = await fetch('/api/play', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ track_id: trackId })
            });
            const data = await response.json();

            if (data.track) {
                showPlayer(data.track);
            }
        }

        async function startRadio() {
            if (!currentState.currentTrack) return;

            const response = await fetch('/api/radio', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ track_id: currentState.currentTrack.id })
            });
            const data = await response.json();

            if (data.playlist) {
                currentState.playlist = data.playlist;
                showPlaylist(data.playlist);
            }
        }

        function showPlayer(track) {
            currentState.currentTrack = track;
            const playerDiv = document.getElementById('player');

            document.getElementById('trackName').textContent = track.name;
            document.getElementById('artistName').textContent = track.artist;

            playerDiv.style.display = 'block';
        }

        function showPlaylist(playlist) {
            const playlistDiv = document.getElementById('playlist');
            const playlistSection = document.getElementById('playlistSection');

            playlistSection.style.display = 'block';

            playlistDiv.innerHTML = playlist.map((t, i) => `
                <div class="track-item" onclick="playTrack(${i})">
                    <img src="${t.image || 'https://via.placeholder.com/50'}" alt="${t.name}">
                    <div class="track-info">
                        <div>${t.name}</div>
                        <div class="artist-name">${t.artist}</div>
                    </div>
                </div>
            `).join('');
        }

        async function togglePlay() {
            const endpoint = currentState.isPlaying ? '/api/pause' : '/api/resume';
            await fetch(endpoint, { method: 'POST' });
            currentState.isPlaying = !currentState.isPlaying;
            document.getElementById('playBtn').textContent = currentState.isPlaying ? '⏸' : '▶';
        }

        async function nextTrack() {
            const response = await fetch('/api/next', { method: 'POST' });
            const data = await response.json();
            if (data.track) {
                showPlayer(data.track);
            }
        }

        async function prevTrack() {
            const response = await fetch('/api/prev', { method: 'POST' });
            const data = await response.json();
            if (data.track) {
                showPlayer(data.track);
            }
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') search();
        });
    </script>
</body>

</html>
