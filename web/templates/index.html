<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Radio</title>
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1DB954 0%, #191414 100%);
            min-height: 100vh;
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #b3b3b3;
            font-size: 1.1rem;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab.active {
            background: #1DB954;
        }

        .tab:hover:not(.active) {
            background: rgba(255, 255, 255, 0.2);
        }

        .search-box {
            display: flex;
            gap: 10px;
            max-width: 600px;
            margin: 0 auto 30px;
        }

        input {
            flex: 1;
            padding: 15px 20px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            background: rgba(255, 255, 255, 0.95);
            color: #191414;
        }

        input:focus {
            box-shadow: 0 0 0 3px rgba(29, 185, 84, 0.5);
        }

        input::placeholder {
            color: #666;
        }

        button {
            padding: 15px 30px;
            border: none;
            border-radius: 30px;
            background: #1DB954;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.05);
            background: #1ed760;
        }

        button:disabled {
            background: #535353;
            cursor: not-allowed;
            transform: none;
        }

        .player {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            text-align: center;
            backdrop-filter: blur(10px);
            display: none;
        }

        .player.active {
            display: block;
        }

        .album-art {
            width: 280px;
            height: 280px;
            margin: 0 auto 20px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        .album-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .album-art::before {
            content: '♪';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            color: rgba(255, 255, 255, 0.3);
            display: none;
        }

        .current-track {
            margin-bottom: 20px;
        }

        .track-name {
            font-size: 2rem;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .artist-name {
            color: #b3b3b3;
            font-size: 1.2rem;
        }

        .album-name {
            color: #535353;
            font-size: 1rem;
            margin-top: 5px;
        }

        .progress-container {
            margin: 25px 0;
            padding: 0 20px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #535353;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .progress-bar:hover {
            height: 10px;
        }

        .progress {
            height: 100%;
            background: linear-gradient(90deg, #1DB954, #1ed760);
            width: 0%;
            transition: width 0.1s;
            border-radius: 4px;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            color: #b3b3b3;
            font-size: 0.9rem;
            font-family: monospace;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 25px;
        }

        .controls button {
            background: #535353;
            padding: 15px 20px;
            border-radius: 50%;
            font-size: 18px;
        }

        .controls button.play-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 28px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1DB954;
        }

        .controls button.play-btn:hover {
            transform: scale(1.1);
            background: #1ed760;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }

        .volume-control input {
            width: 120px;
            padding: 5px;
            cursor: pointer;
        }

        .volume-icon {
            font-size: 20px;
        }

        .radio-btn {
            margin-top: 20px;
        }

        .radio-btn button {
            background: linear-gradient(135deg, #E91429, #f72d54);
        }

        .radio-btn button:hover {
            background: linear-gradient(135deg, #f72d54, #ff4060);
        }

        .playlist {
            margin-top: 30px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 20px;
        }

        .playlist h2 {
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .track-count {
            color: #b3b3b3;
            font-size: 0.9rem;
        }

        .track-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 5px;
        }

        .track-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .track-item.playing {
            background: rgba(29, 185, 84, 0.3);
            border-left: 4px solid #1DB954;
        }

        .track-number {
            width: 30px;
            color: #b3b3b3;
            font-size: 0.9rem;
            text-align: center;
        }

        .track-item.playing .track-number {
            color: #1DB954;
        }

        .track-item img {
            width: 50px;
            height: 50px;
            border-radius: 5px;
            margin-right: 15px;
            object-fit: cover;
        }

        .track-info {
            flex: 1;
            text-align: left;
        }

        .track-info .name {
            font-weight: 500;
            margin-bottom: 3px;
            font-size: 1rem;
        }

        .track-info .artist {
            color: #b3b3b3;
            font-size: 0.85rem;
        }

        .track-duration {
            color: #b3b3b3;
            font-size: 0.85rem;
            padding: 0 10px;
        }

        .results {
            margin-top: 30px;
        }

        .results h2 {
            margin-bottom: 15px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-message {
            background: rgba(255, 0, 0, 0.15);
            border: 1px solid rgba(255, 0, 0, 0.5);
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            color: #ff6b6b;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .now-playing-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .now-playing-bar.active {
            display: flex;
        }

        .now-playing-info {
            display: flex;
            align-items: center;
            flex: 1;
        }

        .now-playing-info img {
            width: 50px;
            height: 50px;
            border-radius: 5px;
            margin-right: 15px;
        }

        .now-playing-text .name {
            font-weight: 500;
            font-size: 0.9rem;
        }

        .now-playing-text .artist {
            color: #b3b3b3;
            font-size: 0.8rem;
        }

        .now-playing-controls {
            display: flex;
            gap: 15px;
        }

        .now-playing-controls button {
            padding: 10px;
            background: transparent;
            font-size: 18px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .album-art {
                width: 200px;
                height: 200px;
            }

            .track-name {
                font-size: 1.5rem;
            }

            .controls {
                gap: 10px;
            }

            .controls button.play-btn {
                width: 60px;
                height: 60px;
                font-size: 22px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🎧 Spotify Radio</h1>
            <p class="subtitle">Поиск и потоковая трансляция музыки из Spotify</p>
        </header>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('search')">🔍 Поиск</button>
            <button class="tab" onclick="switchTab('radio')">📻 Радио</button>
            <button class="tab" onclick="switchTab('playlists')">📋 Плейлисты</button>
        </div>

        <!-- Поиск -->
        <div class="section active" id="section-search">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск треков, исполнителей, альбомов...">
                <button onclick="search()" id="searchBtn">Поиск</button>
            </div>

            <div class="error-message" id="errorMessage" style="display: none;"></div>

            <div class="results" id="results" style="display: none;">
                <h2>� результатов найдено</h2>
                <div id="resultsList"></div>
            </div>
        </div>

        <!-- Радио -->
        <div class="section" id="section-radio">
            <div class="search-box">
                <input type="text" id="radioInput" placeholder="Введите название трека для радио...">
                <button onclick="createRadio()" id="radioBtn">📻 Создать радио</button>
            </div>
            <div id="radioResults"></div>
        </div>

        <!-- Плейлисты -->
        <div class="section" id="section-playlists">
            <div class="player" id="player">
                <div class="album-art" id="albumArt">
                    <img src="https://via.placeholder.com/280x280/191414/1DB954?text=♪" alt="Album">
                </div>
                <div class="current-track">
                    <div class="track-name" id="trackName"></div>
                    <div class="artist-name" id="artistName"></div>
                    <div class="album-name" id="albumName"></div>
                </div>

                <div class="progress-container">
                    <div class="progress-bar" onclick="seek(event)">
                        <div class="progress" id="progress"></div>
                    </div>
                    <div class="time-display">
                        <span id="currentTime">0:00</span>
                        <span id="totalTime">0:00</span>
                    </div>
                </div>

                <div class="controls">
                    <button onclick="prevTrack()">⏮</button>
                    <button class="play-btn" onclick="togglePlay()" id="playBtn">▶</button>
                    <button onclick="nextTrack()">⏭</button>
                </div>

                <div class="volume-control">
                    <span class="volume-icon">🔈</span>
                    <input type="range" min="0" max="100" value="100" onchange="setVolume(this.value)">
                    <span class="volume-icon">🔊</span>
                </div>

                <div class="radio-btn">
                    <button onclick="startRadio()">📻 Создать радио на основе этого трека</button>
                </div>

                <div class="playlist" id="playlistSection" style="display: none;">
                    <div class="playlist-header">
                        <h2>📋 Плейлист</h2>
                        <span class="track-count" id="trackCount"></span>
                    </div>
                    <div id="playlist"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Нижняя панель -->
    <div class="now-playing-bar" id="nowPlayingBar" style="display: none;">
        <div class="now-playing-info">
            <img src="https://via.placeholder.com/50x50" alt="" id="barImage">
            <div class="now-playing-text">
                <div class="name" id="barName"></div>
                <div class="artist" id="barArtist"></div>
            </div>
        </div>
        <div class="now-playing-controls">
            <button onclick="prevTrack()">⏮</button>
            <button onclick="togglePlay()" id="barPlayBtn">▶</button>
            <button onclick="nextTrack()">⏭</button>
        </div>
    </div>

    <script>
        let currentState = {
            isPlaying: false,
            currentTrack: null,
            playlist: [],
            currentIndex: 0,
            progress: 0,
            duration: 0
        };

        let audio = new Audio();

        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const progress = (audio.currentTime / audio.duration) * 100;
                document.getElementById('progress').style.width = progress + '%';
                document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
                document.getElementById('totalTime').textContent = formatTime(audio.duration);
            }
        });

        audio.addEventListener('ended', () => {
            nextTrack();
        });

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById('section-' + tab).classList.add('active');

            if (tab === 'playlists' && currentState.currentTrack) {
                document.getElementById('player').classList.add('active');
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        async function search() {
            const query = document.getElementById('searchInput').value;
            const searchBtn = document.getElementById('searchBtn');

            if (!query) return;

            searchBtn.disabled = true;
            searchBtn.innerHTML = '<span class="loading"></span>Поиск...';

            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();

                if (data.error) {
                    showError(data.error);
                    return;
                }

                if (data.tracks) {
                    showResults(data.tracks);
                }
            } catch (e) {
                showError('Ошибка при поиске: ' + e.message);
            } finally {
                searchBtn.disabled = false;
                searchBtn.textContent = 'Поиск';
            }
        }

        function showResults(tracks) {
            const resultsDiv = document.getElementById('results');
            const resultsList = document.getElementById('resultsList');

            resultsList.innerHTML = tracks.map((track, index) => `
                <div class="track-item" onclick="selectTrack('${track.id}')">
                    <img src="${track.image || 'https://via.placeholder.com/50x50'}" alt="${track.name}">
                    <div class="track-info">
                        <div class="name">${track.name}</div>
                        <div class="artist">${track.artist}</div>
                    </div>
                    <span class="track-duration">${formatTime(track.duration_ms / 1000)}</span>
                </div>
            `).join('');

            resultsDiv.style.display = 'block';
        }

        async function createRadio() {
            const query = document.getElementById('radioInput').value;
            const radioBtn = document.getElementById('radioBtn');

            if (!query) return;

            radioBtn.disabled = true;
            radioBtn.innerHTML = '<span class="loading"></span>Создание радио...';

            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();

                if (data.error) {
                    showError(data.error);
                    return;
                }

                if (data.tracks && data.tracks.length > 0) {
                    const track = data.tracks[0];
                    await startRadioWithTrack(track.id);
                }
            } catch (e) {
                showError('Ошибка: ' + e.message);
            } finally {
                radioBtn.disabled = false;
                radioBtn.textContent = '📻 Создать радио';
            }
        }

        async function selectTrack(trackId) {
            try {
                const response = await fetch('/api/play', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ track_id: trackId })
                });
                const data = await response.json();

                if (data.error) {
                    showError(data.error);
                    return;
                }

                if (data.track) {
                    showPlayer(data.track);
                }
            } catch (e) {
                showError('Ошибка: ' + e.message);
            }
        }

        async function startRadioWithTrack(trackId) {
            try {
                const response = await fetch('/api/radio', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ track_id: trackId })
                });
                const data = await response.json();

                if (data.error) {
                    showError(data.error);
                    return;
                }

                if (data.playlist) {
                    currentState.playlist = data.playlist;
                    currentState.currentIndex = 0;
                    showPlaylist(data.playlist);

                    if (data.current_track) {
                        showPlayer(data.current_track);
                    }

                    switchTab('playlists');
                }
            } catch (e) {
                showError('Ошибка: ' + e.message);
            }
        }

        async function startRadio() {
            if (!currentState.currentTrack) return;
            await startRadioWithTrack(currentState.currentTrack.id);
        }

        function showPlayer(track) {
            currentState.currentTrack = track;
            const playerDiv = document.getElementById('player');

            document.getElementById('trackName').textContent = track.name;
            document.getElementById('artistName').textContent = track.artist;
            document.getElementById('albumName').textContent = track.album || '';

            const albumArt = document.getElementById('albumArt').querySelector('img');
            albumArt.src = track.image || 'https://via.placeholder.com/280x280/191414/1DB954?text=♪';

            // Обновление нижней панели
            document.getElementById('barImage').src = track.image || 'https://via.placeholder.com/50x50';
            document.getElementById('barName').textContent = track.name;
            document.getElementById('barArtist').textContent = track.artist;
            document.getElementById('nowPlayingBar').style.display = 'flex';

            // Setup audio
            if (track.preview_url) {
                audio.src = track.preview_url;
                audio.play();
                currentState.isPlaying = true;
                document.getElementById('playBtn').textContent = '⏸';
                document.getElementById('barPlayBtn').textContent = '⏸';
            } else {
                showError('Превью недоступно. Используйте Spotify для полного воспроизведения');
            }

            playerDiv.classList.add('active');
        }

        function showPlaylist(playlist) {
            const playlistDiv = document.getElementById('playlist');
            const playlistSection = document.getElementById('playlistSection');

            playlistSection.style.display = 'block';
            document.getElementById('trackCount').textContent = `${playlist.length} треков`;

            playlistDiv.innerHTML = playlist.map((t, i) => `
                <div class="track-item ${i === currentState.currentIndex ? 'playing' : ''}" onclick="playTrack(${i})">
                    <span class="track-number">${i + 1}</span>
                    <img src="${t.image || 'https://via.placeholder.com/50x50'}" alt="${t.name}">
                    <div class="track-info">
                        <div class="name">${t.name}</div>
                        <div class="artist">${t.artist}</div>
                    </div>
                    <span class="track-duration">${formatTime(t.duration_ms / 1000)}</span>
                </div>
            `).join('');
        }

        async function playTrack(index) {
            currentState.currentIndex = index;
            const track = currentState.playlist[index];
            await selectTrack(track.id);
            showPlaylist(currentState.playlist);
        }

        function togglePlay() {
            if (currentState.isPlaying) {
                audio.pause();
            } else {
                audio.play();
            }
            currentState.isPlaying = !currentState.isPlaying;
            document.getElementById('playBtn').textContent = currentState.isPlaying ? '⏸' : '▶';
            document.getElementById('barPlayBtn').textContent = currentState.isPlaying ? '⏸' : '▶';
        }

        function seek(event) {
            const progressBar = event.currentTarget;
            const percent = (event.offsetX / progressBar.offsetWidth);
            if (audio.duration) {
                audio.currentTime = percent * audio.duration;
            }
        }

        function setVolume(value) {
            audio.volume = value / 100;
        }

        async function nextTrack() {
            if (currentState.playlist.length > 0) {
                currentState.currentIndex = (currentState.currentIndex + 1) % currentState.playlist.length;
                await playTrack(currentState.currentIndex);
            }
        }

        async function prevTrack() {
            if (currentState.playlist.length > 0) {
                currentState.currentIndex = (currentState.currentIndex - 1 + currentState.playlist.length) % currentState.playlist.length;
                await playTrack(currentState.currentIndex);
            }
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') search();
        });

        document.getElementById('radioInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') createRadio();
        });
    </script>
</body>

</html>
